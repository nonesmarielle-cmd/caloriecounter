  @font-face {
    font-family: 'JetBrains Mono';
    src: local('JetBrains Mono');
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #D64E27;
    color: #131311;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 0 0 100px;
    position: relative;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 8px;
  }
  .header .date {
    font-size: 13px;
    color: #131311;
    letter-spacing: 0.02em;
  }
  .header .title {
    font-family: 'PP Mori Black', -apple-system, sans-serif;
    font-size: 13.6px;
    font-weight: 900;
    color: #131311;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  .icon-btn {
    background: none;
    border: none;
    color: #131311;
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn svg { width: 20px; height: 20px; }
  .gauge-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 20px 24px;
  }
  .gauge-center {
    font-family: 'JetBrains Mono', monospace;
  }
  .gauge-remaining {
    font-family: 'PP Mori Black', -apple-system, sans-serif;
    font-size: 50px;
    font-weight: 900;
    line-height: 1;
  }
  .gauge-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px;
    color: #131311;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }
  .gauge-sub {
    display: flex;
    gap: 18px;
    margin-bottom: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .gauge-sub .stat-label { color: #131311; }
  .gauge-sub .stat-val { color: #D8A857; margin-left: 4px; }
  .section-label {
    font-size: 11px;
    color: #131311;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0 20px;
    margin: 10px 0 8px;
  }
  .meal-group-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 20px;
    margin: 14px 0 8px;
  }
  .meal-group-label span:first-child {
    font-size: 12px;
    font-weight: 500;
    color: #C7C4B7;
  }
  .meal-group-label span:last-child {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: #131311;
  }
  .log {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .entry {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #D64E27;
    border: 1px solid #963717;
    border-radius: 12px;
    padding: 10px;
  }
  .entry img {
    width: 48px; height: 48px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: #26251F;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-name {
    font-size: 14px;
    font-weight: 500;
    color: #131311;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-portion {
    font-size: 12px;
    color: #131311;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .entry-cals {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #D8A857;
    flex-shrink: 0;
  }
  .entry-del {
    background: none;
    border: none;
    color: #131311;
    padding: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .entry-del svg { width: 16px; height: 16px; }
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: #8C897C;
    font-size: 13px;
    line-height: 1.6;
  }
  .fab-row {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    max-width: 480px;
  }
  .fab {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: #D64E27;
    border: 1.5px solid #963717;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .fab svg { width: 24px; height: 24px; color: #131311; }
  .fab:active { transform: scale(0.95); }
  .fab-secondary {
    background: #D64E27;
    border: 1.5px solid #963717;
    width: 58px; height: 58px;
  }
  .fab-secondary svg { width: 23px; height: 23px; color: #131311; }
  .fab-secondary:active { transform: scale(0.95); }
  .activity-icon {
    width: 48px; height: 48px;
    border-radius: 8px;
    background: #26251F;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .activity-icon svg { width: 20px; height: 20px; color: #D8A857; }
  .entry-cals.burn { color: #7FB88A; }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1;
    background: #131311;
    border: 1px solid #33322A;
    color: #8C897C;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 6px;
    border-radius: 8px;
    cursor: pointer;
  }
  .tab-btn.active {
    border-color: #D64E27;
    color: #D64E27;
  }
  .sheet label {
    font-size: 12px;
    color: #8C897C;
    display: block;
    margin: 12px 0 6px;
  }
  .sheet label:first-of-type { margin-top: 0; }
  .sheet select, .sheet input[type=text], .sheet textarea {
    width: 100%;
    background: #131311;
    border: 1px solid #33322A;
    color: #EFEDE4;
    font-size: 14px;
    border-radius: 10px;
    padding: 11px 12px;
  }
  .sheet textarea {
    font-family: inherit;
    resize: vertical;
    min-height: 90px;
    line-height: 1.5;
  }
  .hint {
    font-size: 11px;
    color: #8C897C;
    margin-top: 6px;
    line-height: 1.5;
  }
  .page-nav {
    display: flex;
    gap: 8px;
    padding: 0 20px 16px;
  }
  .page-nav .tab-btn {
    padding: 10px 6px;
    background: #D64E27;
    border-color: #963717;
    color: #131311;
  }
  .page-nav .tab-btn.active {
    color: #131311;
  }
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px 16px;
  }
  .cal-month {
    font-size: 14px;
    font-weight: 600;
  }
  .cal-nav-btn {
    background: none;
    border: none;
    color: #131311;
    padding: 6px;
    cursor: pointer;
    display: flex;
  }
  .cal-nav-btn svg { width: 18px; height: 18px; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 5px;
    padding: 0 16px 24px;
  }
  .cal-dow {
    font-size: 10px;
    color: #131311;
    text-align: center;
    text-transform: uppercase;
    padding-bottom: 4px;
    letter-spacing: 0.04em;
  }
  .cal-day {
    aspect-ratio: 1;
    min-width: 0;
    border-radius: 8px;
    background: #1C1B17;
    border: 1px solid #26251F;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 2px;
    overflow: hidden;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
  }
  .cal-day:active { transform: scale(0.94); }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.empty:active { transform: none; }
  .cal-day .d-num { font-size: 9px; color: #66655C; }
  .cal-day .d-cal {
    font-size: 10px;
    font-weight: 500;
    color: #8C897C;
    max-width: 100%;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .cal-day.under { border-color: #2E4A33; background: #182018; }
  .cal-day.under .d-cal { color: #7FB88A; }
  .cal-day.over { border-color: #4A3320; background: #241A15; }
  .cal-day.over .d-cal { color: #D8756A; }
  .cal-day.today-cell { border-color: #D8A857; border-width: 1.5px; }
  .cal-legend {
    display: flex;
    gap: 16px;
    padding: 0 16px 20px;
    font-size: 11px;
    color: #131311;
  }
  .cal-legend span { display: flex; align-items: center; gap: 6px; }
  .cal-dot { width: 8px; height: 8px; border-radius: 50%; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,8,0.85);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 20;
  }
  .sheet {
    width: 100%;
    max-width: 480px;
    background: #1C1B17;
    border-radius: 20px 20px 0 0;
    padding: 22px 20px calc(22px + env(safe-area-inset-bottom));
  }
  .sheet-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .sheet input[type=number] {
    width: 100%;
    background: #131311;
    border: 1px solid #33322A;
    color: #EFEDE4;
    font-family: 'PP Mori Black', -apple-system, sans-serif;
    font-size: 20px;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .sheet input[type=number]::placeholder { color: #EFEDE4; opacity: 1; }
  .sheet input[type=number]::-webkit-input-placeholder { color: #EFEDE4; opacity: 1; }
  .sheet input[type=number]::-moz-placeholder { color: #EFEDE4; opacity: 1; }
  .sheet input[type=number]:-ms-input-placeholder { color: #EFEDE4; opacity: 1; }
  .sheet-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    flex: 1;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: #D64E27; color: #131311; }
  .btn-secondary { background: transparent; color: #8C897C; border: 1px solid #33322A; }
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 14px;
    color: #8C897C;
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #33322A;
    border-top-color: #D8A857;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .analyzed-preview {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .analyzed-preview img {
    width: 64px; height: 64px;
    border-radius: 10px;
    object-fit: cover;
  }
  .analyzed-name { font-size: 15px; font-weight: 600; }
  .analyzed-portion { font-size: 12px; color: #8C897C; margin-top: 3px; }
  .analyzed-cals {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    color: #D8A857;
    margin-top: 2px;
  }
  .percent-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .percent-row input[type=range] {
    flex: 1;
    accent-color: #D8A857;
  }
  .percent-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #D8A857;
    min-width: 44px;
    text-align: right;
  }
  .err {
    background: #2A1E17;
    border: 1px solid #4A3320;
    color: #E0A56E;
    font-size: 13px;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .profile-page {
    padding: 130px 24px 24px;
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
  }
  .profile-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .profile-logo-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .profile-logo { width: 100%; max-width: 260px; height: auto; }
  .profile-sub { font-size: 13px; color: #131311; margin-bottom: 28px; }
  .profile-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .profile-btn {
    text-align: center;
    background: #1C1B17;
    border: 1px solid #33322A;
    color: #EFEDE4;
    font-size: 14px;
    font-weight: 500;
    padding: 13px 14px;
    border-radius: 10px;
    cursor: pointer;
  }
  .profile-btn:active { transform: scale(0.98); }
  .profile-page label {
    font-size: 12px;
    color: #131311;
    display: block;
    margin: 4px 0 6px;
  }
  .profile-page input[type=text] {
    width: 70%;
    margin: 0 auto;
    display: block;
    background: transparent;
    border: none;
    border-bottom: 2px dotted #131311;
    color: #131311;
    font-size: 16px;
    text-align: center;
    border-radius: 0;
    padding: 11px 4px;
  }
  .profile-page input[type=text]::placeholder { color: rgba(19, 19, 17, 0.45); }
  .profile-page input[type=text]:focus { outline: none; }
  .profile-continue-wrap { display: flex; justify-content: center; margin-top: 16px; }
  .profile-continue-btn {
    background: #131311;
    color: #D64E27;
    border: none;
    border-radius: 10px;
    padding: 13px 32px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .profile-continue-btn:active { transform: scale(0.97); }
</style>

const API_BASE = 'https://caloriecounter-api.nonesmarielle.workers.dev';

async function kvGet(key) {
  try {
    const res = await fetch(API_BASE + '/kv/' + encodeURIComponent(key));
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('kv get failed');
    const value = await res.text();
    return { value };
  } catch(e) { return null; }
}

async function kvSet(key, value) {
  try {
    const res = await fetch(API_BASE + '/kv/' + encodeURIComponent(key), {
      method: 'PUT',
      headers: { 'Content-Type': 'text/plain' },
      body: value
    });
    return res.ok;
  } catch(e) { return false; }
}

async function kvList(prefix) {
  try {
    const res = await fetch(API_BASE + '/kv-list?prefix=' + encodeURIComponent(prefix));
    if (!res.ok) return { keys: [] };
    const data = await res.json();
    return { keys: data.keys || [] };
  } catch(e) { return { keys: [] }; }
}

function todayKey() {
  const d = new Date();
  return 'log:' + state.profile + ':' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function activityKey() {

  return 'activity:' + state.profile + ':' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function settingsKey() {
  return 'settings:' + state.profile;
}

function currentProfileName() {
  const p = state.profilesList.find(x => x.slug === state.profile);
  return p ? p.name : '';
}

function todayDateStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function monthPrefix(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function defaultMealType() {
  const h = new Date().getHours();
  if (h < 11) return 'breakfast';
  if (h < 15) return 'lunch';
  if (h < 19) return 'dinner';
  return 'snack';
}

function slugify(name) {
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

async function boot() {
  await loadProfilesList();
  let saved = null;
  try {
    saved = localStorage.getItem('current-profile') || null;
  } catch(e) {}
  if (saved && state.profilesList.some(p => p.slug === saved)) {
    state.profile = saved;
    state.booting = false;
    await loadState();
  } else {
    state.profile = null;
    state.booting = false;
    render();
  }
}

async function loadProfilesList() {
  try {
    const r = await kvGet('profiles-list');
    if (r && r.value) state.profilesList = JSON.parse(r.value);
  } catch(e) { state.profilesList = []; }
}

async function saveProfilesList() {
  try { await kvSet('profiles-list', JSON.stringify(state.profilesList)); }
  catch(e) { console.error('save profiles list failed', e); }
}

async function selectProfile(slug) {
  state.profile = slug;
  state.profileError = null;
  try { localStorage.setItem('current-profile', slug); } catch(e) {}
  await loadState();
}

async function createProfile() {
  const input = document.getElementById('newProfileInput');
  const name = input.value.trim();
  if (!name) return;
  const slug = slugify(name);
  if (!slug) return;
  const existing = state.profilesList.find(p => p.slug === slug);
  if (existing) {
    await selectProfile(existing.slug);
    return;
  }
  state.profilesList.push({ slug, name });
  await saveProfilesList();
  await selectProfile(slug);
}

function switchProfile() {
  state.profile = null;
  state.profileError = null;
  try { localStorage.removeItem('current-profile'); } catch(e) {}
  state.view = null;
  render();
}

function fmtDate() {
  return new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
}

async function loadState() {
  state.limit = 2000;
  state.weight = 70;
  state.entries = [];
  state.activities = [];
  state.steps = 0;
  try {
    const s = await kvGet(settingsKey());
    if (s && s.value) {
      const parsed = JSON.parse(s.value);
      state.limit = parsed.dailyLimit || 2000;
      state.weight = parsed.weightKg || 70;
    }
  } catch(e) {}
  try {
    const l = await kvGet(todayKey());
    if (l && l.value) state.entries = JSON.parse(l.value);
  } catch(e) {}
  try {
    const a = await kvGet(activityKey());
    if (a && a.value) {
      const parsed = JSON.parse(a.value);
      state.activities = parsed.activities || [];
      state.steps = parsed.steps || 0;
    }
  } catch(e) {}
  state.limitDraft = state.limit;
  state.weightDraft = state.weight;
  state.stepsDraft = state.steps;
  state.page = 'today';
  render();
}

async function saveEntries() {
  try { await kvSet(todayKey(), JSON.stringify(state.entries)); }
  catch(e) { console.error('save entries failed', e); }
}

async function saveActivity() {
  try { await kvSet(activityKey(), JSON.stringify({ activities: state.activities, steps: state.steps })); }
  catch(e) { console.error('save activity failed', e); }
}

async function saveSettings() {
  try { await kvSet(settingsKey(), JSON.stringify({ dailyLimit: state.limit, weightKg: state.weight })); }
  catch(e) { console.error('save settings failed', e); }
}

function caloriesFromSteps(steps, weightKg) {
  return Math.round(steps * 0.00057 * weightKg);
}

function render() {
  if (state.booting) {
    document.getElementById('app').innerHTML = '';
    return;
  }
  if (!state.profile) {
    document.getElementById('app').innerHTML = renderProfilePicker();
    return;
  }

  const consumed = state.entries.reduce((sum, e) => sum + e.calories, 0);
  const stepCals = caloriesFromSteps(state.steps, state.weight);
  const burned = stepCals + state.activities.reduce((sum, a) => sum + a.calories, 0);
  const effectiveBudget = state.limit + burned;
  const remaining = effectiveBudget - consumed;
  const pct = Math.max(0, Math.min(1, consumed / effectiveBudget));
  const circumference = 2 * Math.PI * 70;
  const dashOffset = circumference * (1 - pct);
  const ringColor = remaining < 0 ? '#D8756A' : '#D8A857';

  let html = '';
  html += '<div class="header">';
  html += '<div><div class="title">' + escapeHtml(currentProfileName()) + '\u2019s Burn Book</div><div class="date">' + fmtDate() + '</div></div>';
  html += '<div style="display:flex;gap:2px;">';
  html += '<button class="icon-btn" onclick="switchProfile()" title="Switch profile">' + icon('users') + '</button>';
  html += '<button class="icon-btn" onclick="openSettings()">' + icon('settings') + '</button>';
  html += '</div>';
  html += '</div>';

  html += '<div class="page-nav">';
  html += '<button class="tab-btn' + (state.page === 'today' ? ' active' : '') + '" onclick="switchPage(\'today\')">Today</button>';
  html += '<button class="tab-btn' + (state.page === 'calendar' ? ' active' : '') + '" onclick="switchPage(\'calendar\')">Calendar</button>';
  html += '</div>';

  if (state.page === 'calendar') {
    html += renderCalendarPage();
  } else {

  html += '<div class="gauge-wrap">';
  html += '<div class="gauge-sub">';
  html += '<span><span class="stat-label">eaten</span><span class="stat-val">' + consumed.toLocaleString() + '</span></span>';
  html += '<span><span class="stat-label">budget</span><span class="stat-val">' + state.limit.toLocaleString() + '</span></span>';
  if (burned > 0) {
    html += '<span><span class="stat-label">burned</span><span class="stat-val" style="color:#7FB88A">+' + burned.toLocaleString() + '</span></span>';
  }
  html += '</div>';
  html += '<svg width="170" height="170" viewBox="0 0 170 170">';
  html += '<circle cx="85" cy="85" r="70" fill="none" stroke="#963717" stroke-width="12"/>';
  html += '<circle cx="85" cy="85" r="70" fill="none" stroke="' + ringColor + '" stroke-width="12" stroke-linecap="round" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + dashOffset + '" transform="rotate(-90 85 85)" style="transition: stroke-dashoffset 0.4s ease"/>';
  html += '</svg>';
  html += '<div class="gauge-center" style="margin-top:-118px">';
  html += '<div class="gauge-remaining" style="text-align:center">' + Math.abs(remaining).toLocaleString() + '</div>';
  html += '<div class="gauge-label" style="text-align:center">' + (remaining < 0 ? 'over budget' : 'kcal left') + '</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="section-label">Today\'s log</div>';
  if (state.entries.length === 0) {
    html += '<div class="empty" style="color:#131311;">Logging your meals? What, like it\'s hard?</div>';
  } else {
    const mealOrder = ['breakfast', 'lunch', 'dinner', 'snack'];
    const mealLabels = { breakfast: 'Breakfast', lunch: 'Lunch', dinner: 'Dinner', snack: 'Snacks' };
    mealOrder.forEach(meal => {
      const group = state.entries.filter(e => (e.mealType || 'snack') === meal);
      if (group.length === 0) return;
      const groupTotal = group.reduce((s, e) => s + e.calories, 0);
      html += '<div class="meal-group-label"><span>' + mealLabels[meal] + '</span><span>' + groupTotal.toLocaleString() + ' kcal</span></div>';
      html += '<div class="log">';
      group.slice().reverse().forEach(e => {
        html += '<div class="entry">';
        html += e.thumb ? ('<img src="' + e.thumb + '">') : ('<div class="activity-icon">' + icon('edit') + '</div>');
        html += '<div class="entry-info"><div class="entry-name">' + escapeHtml(e.name) + '</div><div class="entry-portion">' + escapeHtml(e.portion) + '</div></div>';
        html += '<div class="entry-cals">' + e.calories + '</div>';
        html += '<button class="entry-del" onclick="deleteEntry(\'' + e.id + '\')">' + icon('trash') + '</button>';
        html += '</div>';
      });
      html += '</div>';
    });
  }

  if (state.steps > 0 || state.activities.length > 0) {
    html += '<div class="section-label">Activity</div>';
    html += '<div class="log">';
    if (state.steps > 0) {
      html += '<div class="entry">';
      html += '<div class="activity-icon">' + icon('footprints') + '</div>';
      html += '<div class="entry-info"><div class="entry-name">' + state.steps.toLocaleString() + ' steps</div><div class="entry-portion">walking, estimated</div></div>';
      html += '<div class="entry-cals burn">+' + stepCals + '</div>';
      html += '<button class="entry-del" onclick="clearSteps()">' + icon('trash') + '</button>';
      html += '</div>';
    }
    state.activities.slice().reverse().forEach(a => {
      html += '<div class="entry">';
      html += '<div class="activity-icon">' + icon('flame') + '</div>';
      html += '<div class="entry-info"><div class="entry-name">' + escapeHtml(a.name) + '</div><div class="entry-portion">' + escapeHtml(a.detail) + '</div></div>';
      html += '<div class="entry-cals burn">+' + a.calories + '</div>';
      html += '<button class="entry-del" onclick="deleteActivity(\'' + a.id + '\')">' + icon('trash') + '</button>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<div class="fab-row">';
  html += '<button class="fab fab-secondary" onclick="openActivity()">' + icon('flame') + '</button>';
  html += '<button class="fab fab-secondary" onclick="openDescribe()">' + icon('edit') + '</button>';
  html += '<button class="fab" onclick="triggerCamera()">' + icon('camera') + '</button>';
  html += '</div>';

  }

  if (state.view === 'settings') {
    html += renderSettingsSheet();
  } else if (state.view === 'analyzing') {
    html += renderAnalyzingSheet();
  } else if (state.view === 'result') {
    html += renderResultSheet();
  } else if (state.view === 'activity') {
    html += renderActivitySheet();
  } else if (state.view === 'describe') {
    html += renderDescribeSheet();
  } else if (state.view === 'dayDetail') {
    html += renderDayDetailSheet();
  } else if (state.view === 'workoutResult') {
    html += renderWorkoutResultSheet();
  }

  document.getElementById('app').innerHTML = html;
}

function renderCalendarPage() {
  let h = '';
  const month = state.calendarMonth;
  const year = month.getFullYear();
  const mo = month.getMonth();
  const monthLabel = month.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  const startWeekday = new Date(year, mo, 1).getDay();
  const daysInMonth = new Date(year, mo + 1, 0).getDate();
  const todayStr = todayDateStr();

  h += '<div class="cal-header">';
  h += '<button class="cal-nav-btn" onclick="prevMonth()">' + icon('chevronLeft') + '</button>';
  h += '<div class="cal-month">' + monthLabel + '</div>';
  h += '<button class="cal-nav-btn" onclick="nextMonth()">' + icon('chevronRight') + '</button>';
  h += '</div>';

  if (state.calendarLoading) {
    h += '<div class="loading-wrap"><div class="spinner"></div><div>Loading month\u2026</div></div>';
    return h;
  }

  h += '<div class="cal-grid">';
  ['S','M','T','W','T','F','S'].forEach(d => { h += '<div class="cal-dow">' + d + '</div>'; });
  for (let i = 0; i < startWeekday; i++) h += '<div class="cal-day empty"></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = year + '-' + String(mo + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    const d = state.calendarData[dateStr];
    let cls = 'cal-day';
    let calText = '\u2013';
    if (dateStr === todayStr) cls += ' today-cell';
    if (d) {
      const net = d.consumed - d.burned;
      const remaining = state.limit - net;
      if (remaining >= 0) {
        calText = remaining.toLocaleString();
        cls += ' under';
      } else {
        calText = Math.abs(remaining).toLocaleString();
        cls += ' over';
      }
    }
    h += '<div class="' + cls + '" onclick="openDayDetail(\'' + dateStr + '\')"><div class="d-num">' + day + '</div><div class="d-cal">' + calText + '</div></div>';
  }
  h += '</div>';

  h += '<div class="cal-legend">';
  h += '<span><span class="cal-dot" style="background:#7FB88A"></span>kcal left</span>';
  h += '<span><span class="cal-dot" style="background:#D8756A"></span>kcal over</span>';
  h += '</div>';

  return h;
}

async function switchPage(page) {
  state.page = page;
  if (page === 'calendar') {
    await loadCalendarMonth();
  } else {
    render();
  }
}

async function loadCalendarMonth() {
  state.calendarLoading = true;
  render();
  const prefix = monthPrefix(state.calendarMonth);
  const data = {};
  try {
    const logList = await kvList('log:' + state.profile + ':' + prefix);
    const actList = await kvList('activity:' + state.profile + ':' + prefix);
    const logKeys = (logList && logList.keys) || [];
    const actKeys = (actList && actList.keys) || [];
    await Promise.all(logKeys.map(async key => {
      try {
        const r = await kvGet(key);
        if (r && r.value) {
          const entries = JSON.parse(r.value);
          const dateStr = key.split(':')[2];
          data[dateStr] = data[dateStr] || { consumed: 0, burned: 0 };
          data[dateStr].consumed = entries.reduce((s, e) => s + e.calories, 0);
        }
      } catch(e) {}
    }));
    await Promise.all(actKeys.map(async key => {
      try {
        const r = await kvGet(key);
        if (r && r.value) {
          const parsed = JSON.parse(r.value);
          const dateStr = key.split(':')[2];
          data[dateStr] = data[dateStr] || { consumed: 0, burned: 0 };
          const stepCals = caloriesFromSteps(parsed.steps || 0, state.weight);
          const actCals = (parsed.activities || []).reduce((s, a) => s + a.calories, 0);
          data[dateStr].burned = stepCals + actCals;
        }
      } catch(e) {}
    }));
  } catch(e) { console.error('calendar load failed', e); }
  state.calendarData = data;
  state.calendarLoading = false;
  render();
}

function prevMonth() {
  state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() - 1, 1);
  loadCalendarMonth();
}

function nextMonth() {
  state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() + 1, 1);
  loadCalendarMonth();
}

async function openDayDetail(dateStr) {
  state.selectedDate = dateStr;
  state.dayLoading = true;
  state.view = 'dayDetail';
  render();
  try {
    const l = await kvGet('log:' + state.profile + ':' + dateStr);
    state.dayEntries = (l && l.value) ? JSON.parse(l.value) : [];
  } catch(e) { state.dayEntries = []; }
  try {
    const a = await kvGet('activity:' + state.profile + ':' + dateStr);
    if (a && a.value) {
      const parsed = JSON.parse(a.value);
      state.dayActivities = parsed.activities || [];
      state.daySteps = parsed.steps || 0;
    } else {
      state.dayActivities = [];
      state.daySteps = 0;
    }
  } catch(e) { state.dayActivities = []; state.daySteps = 0; }
  state.dayLoading = false;
  render();
}

function renderDayDetailSheet() {
  let h = '<div class="overlay" onclick="closeSheetIfBackdrop(event)">';
  h += '<div class="sheet">';
  const dateObj = new Date(state.selectedDate + 'T00:00:00');
  const label = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
  h += '<div class="sheet-title">' + label + '</div>';

  if (state.dayLoading) {
    h += '<div class="loading-wrap" style="padding:30px 0;"><div class="spinner"></div><div>Loading\u2026</div></div>';
    h += '</div></div>';
    return h;
  }

  const stepCals = caloriesFromSteps(state.daySteps, state.weight);
  const burned = stepCals + state.dayActivities.reduce((s, a) => s + a.calories, 0);
  const consumed = state.dayEntries.reduce((s, e) => s + e.calories, 0);
  const net = consumed - burned;

  h += '<div class="hint" style="margin-bottom:14px;">Eaten ' + consumed.toLocaleString() + ' kcal' + (burned > 0 ? ' \u2014 burned ' + burned.toLocaleString() + ' kcal' : '') + ' \u2014 net ' + net.toLocaleString() + ' kcal</div>';

  if (state.dayEntries.length === 0 && state.dayActivities.length === 0 && state.daySteps === 0) {
    h += '<div class="empty" style="padding:20px 0;">Nothing logged this day.</div>';
  } else {
    if (state.dayEntries.length > 0) {
      h += '<div class="section-label" style="padding:0;">Food</div>';
      h += '<div class="log" style="margin-bottom:10px;">';
      state.dayEntries.forEach(e => {
        h += '<div class="entry">';
        h += e.thumb ? ('<img src="' + e.thumb + '">') : ('<div class="activity-icon">' + icon('edit') + '</div>');
        h += '<div class="entry-info"><div class="entry-name">' + escapeHtml(e.name) + '</div><div class="entry-portion">' + escapeHtml(e.portion) + '</div></div>';
        h += '<div class="entry-cals">' + e.calories + '</div>';
        h += '<button class="entry-del" onclick="deleteDayEntry(\'' + e.id + '\')">' + icon('trash') + '</button>';
        h += '</div>';
      });
      h += '</div>';
    }
    if (state.daySteps > 0 || state.dayActivities.length > 0) {
      h += '<div class="section-label" style="padding:0;">Activity</div>';
      h += '<div class="log">';
      if (state.daySteps > 0) {
        h += '<div class="entry">';
        h += '<div class="activity-icon">' + icon('footprints') + '</div>';
        h += '<div class="entry-info"><div class="entry-name">' + state.daySteps.toLocaleString() + ' steps</div><div class="entry-portion">walking, estimated</div></div>';
        h += '<div class="entry-cals burn">+' + stepCals + '</div>';
        h += '<button class="entry-del" onclick="clearDaySteps()">' + icon('trash') + '</button>';
        h += '</div>';
      }
      state.dayActivities.forEach(a => {
        h += '<div class="entry">';
        h += '<div class="activity-icon">' + icon('flame') + '</div>';
        h += '<div class="entry-info"><div class="entry-name">' + escapeHtml(a.name) + '</div><div class="entry-portion">' + escapeHtml(a.detail) + '</div></div>';
        h += '<div class="entry-cals burn">+' + a.calories + '</div>';
        h += '<button class="entry-del" onclick="deleteDayActivity(\'' + a.id + '\')">' + icon('trash') + '</button>';
        h += '</div>';
      });
      h += '</div>';
    }
  }

  h += '<div class="sheet-row" style="margin-top:16px;"><button class="btn btn-secondary" style="flex:1;" onclick="closeSheet()">Close</button></div>';
  h += '</div></div>';
  return h;
}

async function saveDayEntries() {
  try { await kvSet('log:' + state.profile + ':' + state.selectedDate, JSON.stringify(state.dayEntries)); }
  catch(e) { console.error('save day entries failed', e); }
}

async function saveDayActivity() {
  try { await kvSet('activity:' + state.profile + ':' + state.selectedDate, JSON.stringify({ activities: state.dayActivities, steps: state.daySteps })); }
  catch(e) { console.error('save day activity failed', e); }
}

function updateCalendarDataForSelectedDate() {
  const stepCals = caloriesFromSteps(state.daySteps, state.weight);
  const burned = stepCals + state.dayActivities.reduce((s, a) => s + a.calories, 0);
  const consumed = state.dayEntries.reduce((s, e) => s + e.calories, 0);
  state.calendarData[state.selectedDate] = { consumed, burned };
}

function syncTodayStateIfSelectedIsToday() {
  if (state.selectedDate === todayDateStr()) {
    state.entries = state.dayEntries;
    state.activities = state.dayActivities;
    state.steps = state.daySteps;
  }
}

function deleteDayEntry(id) {
  state.dayEntries = state.dayEntries.filter(e => e.id !== id);
  saveDayEntries();
  updateCalendarDataForSelectedDate();
  syncTodayStateIfSelectedIsToday();
  render();
}

function deleteDayActivity(id) {
  state.dayActivities = state.dayActivities.filter(a => a.id !== id);
  saveDayActivity();
  updateCalendarDataForSelectedDate();
  syncTodayStateIfSelectedIsToday();
  render();
}

function clearDaySteps() {
  state.daySteps = 0;
  saveDayActivity();
  updateCalendarDataForSelectedDate();
  syncTodayStateIfSelectedIsToday();
  render();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderProfilePicker() {
  let h = '<div class="profile-page">';
  h += '<div class="profile-logo-wrap"><img class="profile-logo" src="' + LOGO_DATA_URI + '" alt="The Burn Book"></div>';
  h += '<div class="profile-sub">What\'s your name?</div>';

    h += '<div class="err">' + escapeHtml(state.profileError) + '</div>';
  }
  h += '<input type="text" id="newProfileInput" placeholder="e.g. Marielle">';
  h += '<div class="profile-continue-wrap"><button class="profile-continue-btn" onclick="createProfile()">Start Tracking</button></div>';
  h += '<div class="hint" style="margin-top:24px;color:#131311;width:70%;margin-left:auto;margin-right:auto;">Welcome to The Burn Book. Your name unlocks your own history. But because we\'re not rich in Tokens, anyone could type your name and peek. So keep this book between us.</div>';
  h += '</div>';
  return h;
}

function renderSettingsSheet() {
  let h = '<div class="overlay" onclick="closeSheetIfBackdrop(event)">';
  h += '<div class="sheet">';
  h += '<div class="sheet-title">Settings</div>';
  h += '<label>Daily calorie budget (kcal)</label>';
  h += '<input type="number" id="limitInput" value="' + state.limitDraft + '" inputmode="numeric">';
  h += '<label>Body weight (kg)</label>';

async function analyzeYoutubeWorkout(urlArg, minutesArg, note) {
  const url = urlArg !== undefined ? urlArg : document.getElementById('ytUrlInput').value.trim();
  const minutesOverride = minutesArg !== undefined ? minutesArg : document.getElementById('ytMinutesInput').value.trim();
  if (!url) return;
  state.ytUrlDraft = url;
  state.ytMinutesDraft = minutesOverride;
  state.activityLoading = true;
  state.activityError = null;
  render();

  try {
    const infoRes = await fetch(API_BASE + '/youtube-info?url=' + encodeURIComponent(url));
    if (!infoRes.ok) throw new Error('Could not fetch video info');
    const info = await infoRes.json();
    if (info.error || (!info.title && !info.description)) {
      state.activityError = "Couldn't read that video's info \u2014 double-check the link, or log the workout manually instead.";
      state.activityLoading = false;
      render();
      return;
    }

    const videoDurationMinutes = info.lengthSeconds ? Math.round(info.lengthSeconds / 60) : null;
    const knownDuration = minutesOverride ? parseInt(minutesOverride, 10) : videoDurationMinutes;

    const systemPrompt = "You identify workout videos from YouTube metadata (title, channel name, and description text) and estimate calories burned. Determine the type of workout (e.g. running, HIIT, cycling, dance cardio, yoga, strength training, boxing, pilates) and its likely intensity from the metadata. Pick the closest standard MET (metabolic equivalent) value for that intensity. If the user's message specifies an exact duration to use, use that exact number for estimated_duration_minutes and for the calorie calculation \u2014 do not re-estimate it. Otherwise, estimate a typical duration for this kind of workout video from the metadata. If the user provides an additional detail (e.g. it was a harder/easier variation, specific weights used, an interrupted session), treat that as ground truth and adjust the estimate accordingly. Calculate estimated calories burned as MET * body_weight_kg * (duration_minutes / 60), rounded to the nearest whole number. Also write a short one-sentence rationale explaining the estimate in plain language, e.g. \"20 min of moderate weight lifting (MET 5.0) at 70 kg \u2248 117 kcal.\" Respond with ONLY a raw JSON object as your final output, no markdown fences, no commentary, in exactly this shape: {\"workout_name\": string, \"estimated_duration_minutes\": integer, \"met_value\": number, \"estimated_calories_burned\": integer, \"rationale\": string}. If the metadata doesn't look like a workout video at all, set workout_name to \"Not found\" and estimated_calories_burned to 0.";

    const durationInstruction = knownDuration
      ? ("Use exactly " + knownDuration + " minutes as the duration performed.")
      : "No exact duration is known \u2014 estimate a typical duration for this kind of workout video from the metadata.";

    const noteText = note ? ("\nAdditional detail from the user \u2014 treat this as ground truth: " + note) : "";

    const userText = "Video title: " + (info.title || "unknown") +
      "\nChannel: " + (info.author || "unknown") +
      "\nDescription: " + (info.description ? info.description.slice(0, 1500) : "none available") +
      "\nUser's body weight: " + state.weight + " kg\n" + durationInstruction + noteText;

    const response = await fetch(API_BASE + "/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 800,
        system: [{ type: "text", text: systemPrompt, cache_control: { type: "ephemeral" } }],
        messages: [{ role: "user", content: userText }]
      })
    });

    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if (!textBlock) throw new Error('No response from model');
    let clean = textBlock.text.trim().replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.workout_name || typeof parsed.estimated_calories_burned !== 'number') {
      throw new Error('Could not read the result.');
    }
    if (parsed.workout_name === 'Not found' || parsed.estimated_calories_burned === 0) {
      state.activityError = "That doesn't look like a workout video based on its title/description. Try a different link, or log it manually instead.";
      state.activityLoading = false;
      render();
      return;
    }

    const finalMinutes = knownDuration || parsed.estimated_duration_minutes;
    const durationLabel = minutesOverride
      ? (minutesOverride + ' min (of a ' + (videoDurationMinutes || parsed.estimated_duration_minutes) + ' min video)')
      : (videoDurationMinutes ? (finalMinutes + ' min video') : (finalMinutes + ' min, estimated'));

    state.pendingWorkout = {
      name: parsed.workout_name,
      detail: durationLabel + ' \u00b7 YouTube',
      calories: parsed.estimated_calories_burned,
      metValue: parsed.met_value,
      minutes: finalMinutes,
      rationale: parsed.rationale || (parsed.met_value + ' MET \u00d7 ' + state.weight + ' kg \u00d7 (' + finalMinutes + '/60) hr \u2248 ' + parsed.estimated_calories_burned + ' kcal')
    };
    state.activityLoading = false;
    state.view = 'workoutResult';
    render();
  } catch (err) {
    console.error(err);
    state.activityLoading = false;
    state.activityError = "Something went wrong looking up that video. Check the link and your connection, then try again.";
    render();
  }
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function resizeImage(dataUrl, maxDimension, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width <= maxDimension && height <= maxDimension) {
        // Already small enough \u2014 just re-encode as JPEG to shrink file size a bit
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/jpeg', quality));
        return;
      }
      if (width > height) {
        height = Math.round(height * (maxDimension / width));
        width = maxDimension;
      } else {
        width = Math.round(width * (maxDimension / height));
        height = maxDimension;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function getFoodSystemPrompt() {
  return "You are a nutrition estimator specialized in Filipino and wider Asian cuisine (Filipino, Chinese, Japanese, Korean, Thai, Vietnamese, Indonesian, Malaysian, Indian). Most photos you'll see are home-cooked or carinderia/hawker-style meals from these cuisines, so identify the specific dish by name rather than a generic description whenever you can \u2014 e.g. say 'chicken adobo' not 'braised meat', 'sinigang na baboy' not 'sour soup', 'pancit canton' not 'stir-fried noodles'.\n\nUse any visible container (rice bowl, plate, kanin cup, glass, mug, palayok/clay pot) as a scale reference for real-world portion size, factoring in depth and fill-level, not just top-down area. Keep these regional conventions in mind:\n- A standard Filipino rice cup/scoop of cooked rice is roughly 150-200g (about 190-260 kcal); many meals are served with 1-2 cups of rice on the side even if the rice is on a separate plate from the ulam (viand) \u2014 account for it if visible.\n- Filipino and Southeast Asian home cooking is often oil-, coconut milk-, or sugar-rich (adobo, kare-kare, bicol express, laing, lechon kawali, crispy pata, halo-halo, turon) \u2014 don't lowball calorie density just because a dish looks like 'just vegetables' or 'just soup'; sauces and frying matter a lot.\n- Common high-calorie-density items to calibrate against: lechon/lechon kawali and crispy pata (very high, deep-fried pork), sisig (fatty, oily), kare-kare (peanut sauce, rich), halo-halo and taho (added sugar/syrup), pancit and lumpia (oil-fried or oil-tossed).\n- Lighter/lower-density reference points: sinigang and tinola broths (mostly water-based, lower calorie unless very meat-heavy), fresh lumpia (unfried), steamed fish, most vegetable-forward ulam.\n- For other Asian cuisine, calibrate similarly: ramen and pho broths are moderate, curries and fried rice are dense, sushi/sashimi is lighter per piece but rice adds up, dumplings and fried items are dense.\n- If multiple dishes/components are visible on one plate (e.g. rice + ulam + a side), estimate each component's contribution and sum them into one total, and mention the components in the portion description.\n- The user may provide additional details the photo can't show, such as ingredient substitutions (e.g. Splenda or another sugar substitute instead of regular sugar, a lower-fat version of an ingredient, a different cooking method). When given, treat this as ground truth and adjust the estimate accordingly \u2014 e.g. a sugar substitute with negligible calories should meaningfully lower the total versus a regular-sugar assumption.\n\nRespond with ONLY a raw JSON object, no markdown fences, no commentary, in exactly this shape: {\"food_name\": string (use the specific local/regional dish name when recognizable), \"portion_description\": string describing the estimated size/volume, container, and any components summed together, \"estimated_calories\": integer, \"confidence\": \"high\" | \"medium\" | \"low\"}. If the image does not clearly show food or drink, set food_name to \"Not recognized\" and estimated_calories to 0.";
}

async function analyzeImage(dataUrl, note) {
  try {
    const commaIdx = dataUrl.indexOf(',');
    const meta = dataUrl.substring(5, commaIdx).split(';')[0];
    const base64 = dataUrl.substring(commaIdx + 1);

    const systemPrompt = getFoodSystemPrompt();
    const userText = "Analyze this plate/glass and estimate the calories." + (note ? " Additional detail from the user \u2014 treat this as ground truth: " + note : "");

    const response = await fetch(API_BASE + "/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: [{ type: "text", text: systemPrompt, cache_control: { type: "ephemeral" } }],
        messages: [
          {
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: meta, data: base64 } },
              { type: "text", text: userText }
            ]
          }
        ]
      })
    });

    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if (!textBlock) throw new Error('No response from model');
    let clean = textBlock.text.trim().replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.food_name || typeof parsed.estimated_calories !== 'number') {
      throw new Error('Could not read the result. Try a clearer photo.');
    }
    if (parsed.food_name === 'Not recognized' || parsed.estimated_calories === 0) {
      state.error = "Couldn't recognize food or drink in that photo. Try again with the dish clearly in frame.";
      state.view = 'result';
      render();
      return;
    }

    state.pendingResult = parsed;
    state.pendingMealType = defaultMealType();
    state.view = 'result';
    render();
  } catch (err) {
    console.error(err);
    state.error = "Something went wrong analyzing that photo. Check your connection and try again.";
    state.view = 'result';
    render();
  }
}

async function analyzeDescription(description, note) {
  try {
    const systemPrompt = getFoodSystemPrompt();
    const noteText = note ? " Additional detail from the user \u2014 treat this as ground truth: " + note : "";
    const userText = "The user describes what they ate as follows (no photo provided): \"" + description + "\"." + noteText + " Estimate the calories based on this description. If the description already specifies portion sizes (e.g. cups, pieces, grams), use those directly rather than guessing; only estimate portion size if the description is vague.";

    const response = await fetch(API_BASE + "/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: [{ type: "text", text: systemPrompt, cache_control: { type: "ephemeral" } }],
        messages: [{ role: "user", content: userText }]
      })
    });

    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if (!textBlock) throw new Error('No response from model');
    let clean = textBlock.text.trim().replace(/^```json/i, '').replace(/^```/, '').replace(/```$/, '').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.food_name || typeof parsed.estimated_calories !== 'number') {
      throw new Error('Could not read the result.');
    }
    if (parsed.food_name === 'Not recognized' || parsed.estimated_calories === 0) {
      state.error = "Couldn't estimate calories from that description. Try adding more detail (what it was, roughly how much).";
      state.view = 'result';
      render();
      return;
    }

    state.pendingResult = parsed;
    state.pendingImage = null;
    state.pendingDescription = description;
    state.pendingMealType = defaultMealType();
    state.view = 'result';
    render();
  } catch (err) {
    console.error(err);
    state.error = "Something went wrong estimating that. Check your connection and try again.";
    state.view = 'result';
    render();
  }
}

function updatePortionPreview(percent) {
  const label = document.getElementById('portionPercentLabel');
  const display = document.getElementById('analyzedCalsDisplay');
  if (label) label.textContent = percent + '%';
  if (display && state.pendingResult) {
    const adjusted = Math.round(state.pendingResult.estimated_calories * (percent / 100));
    display.textContent = adjusted + ' kcal';
  }
}

function confirmAddEntry() {
  const r = state.pendingResult;
  const nameInput = document.getElementById('editNameInput');
  const mealInput = document.getElementById('mealTypeInput');
  const percentInput = document.getElementById('portionPercentSlider');
  const finalName = (nameInput && nameInput.value.trim()) ? nameInput.value.trim() : r.food_name;
  const mealType = mealInput ? mealInput.value : defaultMealType();
  const percent = percentInput ? parseInt(percentInput.value, 10) : 100;
  const finalCalories = Math.round(r.estimated_calories * (percent / 100));
  const portionNote = percent !== 100
    ? r.portion_description + ' \u2014 ' + percent + '% eaten'
    : r.portion_description;
  state.entries.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name: finalName,
    portion: portionNote,
    calories: finalCalories,
    mealType: mealType,
    thumb: state.pendingImage,
    time: Date.now()
  });
  saveEntries();
  closeSheet();
}
